<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>AI 智能分类</title>
    <th:block layout:fragment="head">
        <style>
            :root {
                --bg: #f5f7fa;
                --card-bg: #ffffff;
                --border: #e2e6ee;
                --text: #2d3142;
                --muted: #7b8194;
                --accent: #4361ee;
                --accent-hover: #3651d4;
                --radius: 12px;
                --shadow: 0 1px 3px rgba(0,0,0,0.06);
            }
            body { background-color: var(--bg); }
            .page-header { margin-bottom: 20px; }
            .page-header h3 { font-weight: 700; color: var(--text); margin-bottom: 4px; }
            .page-header p { color: var(--muted); font-size: 0.9rem; margin: 0; }

            /* 工具栏 */
            .toolbar {
                background: var(--card-bg);
                border-radius: var(--radius);
                border: 1px solid var(--border);
                padding: 14px 18px;
                margin-bottom: 16px;
                display: flex;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
            }
            .toolbar select, .toolbar input {
                height: 36px;
                border: 1.5px solid var(--border);
                border-radius: 8px;
                padding: 0 12px;
                font-size: 0.85rem;
                color: var(--text);
                background: #fff;
                outline: none;
            }
            .toolbar select:focus, .toolbar input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 3px rgba(67,97,238,0.12);
            }
            .btn-ai {
                height: 36px;
                padding: 0 18px;
                border: none;
                border-radius: 8px;
                font-size: 0.85rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.2s;
                white-space: nowrap;
            }
            .btn-ai.primary {
                background: var(--accent);
                color: #fff;
            }
            .btn-ai.primary:hover { background: var(--accent-hover); }
            .btn-ai.primary:disabled { opacity: 0.5; cursor: not-allowed; }
            .btn-ai.ghost {
                background: transparent;
                border: 1.5px solid var(--border);
                color: var(--muted);
            }
            .btn-ai.ghost:hover { border-color: var(--accent); color: var(--accent); }
            .select-count { font-size: 0.85rem; color: var(--muted); }

            /* 仓库列表 */
            .repo-list {
                background: var(--card-bg);
                border-radius: var(--radius);
                border: 1px solid var(--border);
                margin-bottom: 16px;
                max-height: 500px;
                overflow-y: auto;
            }
            .repo-item {
                display: flex;
                align-items: center;
                padding: 10px 16px;
                border-bottom: 1px solid #eef1f6;
                cursor: pointer;
                transition: background 0.15s;
                gap: 12px;
            }
            .repo-item:hover { background: #f8f9fc; }
            .repo-item:last-child { border-bottom: none; }
            .repo-item.selected { background: rgba(67,97,238,0.05); }
            .repo-item input[type="checkbox"] {
                width: 16px;
                height: 16px;
                accent-color: var(--accent);
                flex-shrink: 0;
            }
            .repo-item .repo-info { flex: 1; min-width: 0; }
            .repo-item .repo-name-text {
                font-weight: 600;
                color: var(--text);
                font-size: 0.9rem;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .repo-item .repo-desc-text {
                font-size: 0.8rem;
                color: var(--muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-top: 2px;
            }
            .repo-item .repo-meta-text {
                font-size: 0.75rem;
                color: var(--muted);
                display: flex;
                gap: 10px;
                flex-shrink: 0;
            }

            /* 加载状态 */
            .loading-overlay {
                display: none;
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.3);
                z-index: 9999;
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }
            .loading-overlay.show { display: flex; }
            .loading-spinner {
                width: 48px; height: 48px;
                border: 3px solid rgba(255,255,255,0.3);
                border-top-color: #fff;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                margin-bottom: 12px;
            }
            @keyframes spin { to { transform: rotate(360deg); } }
            .loading-text { color: #fff; font-weight: 600; font-size: 1rem; }

            /* 分类结果 */
            .result-section { display: none; }
            .result-section.show { display: block; }
            .category-card {
                background: var(--card-bg);
                border-radius: var(--radius);
                border: 1px solid var(--border);
                margin-bottom: 14px;
                overflow: hidden;
                box-shadow: var(--shadow);
            }
            .category-header {
                padding: 14px 18px;
                background: #f8f9fc;
                border-bottom: 1px solid var(--border);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .category-title {
                font-weight: 700;
                color: var(--text);
                font-size: 1rem;
            }
            .category-count {
                font-size: 0.82rem;
                color: var(--muted);
                background: #fff;
                padding: 2px 10px;
                border-radius: 12px;
                border: 1px solid var(--border);
            }
            .category-body { padding: 10px 0; }
            .category-repo-item {
                display: flex;
                align-items: center;
                padding: 8px 18px;
                font-size: 0.85rem;
                gap: 8px;
                transition: background 0.15s;
            }
            .category-repo-item:hover { background: #f8f9fc; }
            .category-repo-item .lang-badge {
                font-size: 0.7rem;
                padding: 1px 8px;
                border-radius: 10px;
                background: rgba(67,97,238,0.08);
                color: var(--accent);
                flex-shrink: 0;
            }
            .category-repo-item .star-badge {
                font-size: 0.7rem;
                color: #f0a500;
                flex-shrink: 0;
            }
            .category-repo-item a {
                color: var(--accent);
                text-decoration: none;
                flex: 1;
                min-width: 0;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .category-repo-item a:hover { text-decoration: underline; }

            .empty-repos {
                text-align: center;
                padding: 40px;
                color: var(--muted);
            }

            /* 响应式 */
            @media (max-width: 768px) {
                .toolbar { flex-direction: column; }
                .repo-item .repo-meta-text { display: none; }
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <h3><i class="bi bi-cpu"></i> AI 智能分类</h3>
        <p>选择仓库，让 AI 自动帮你归类到合理的技术领域</p>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
        <select id="langFilter" onchange="loadRepos()">
            <option value="">全部语言</option>
            <option th:each="lang : ${languages}" th:value="${lang}" th:text="${lang}">Java</option>
        </select>
        <input type="text" id="kwFilter" placeholder="搜索仓库名/描述..." oninput="loadRepos()" style="flex:1;min-width:180px;">
        <span class="select-count" id="selectCount">已选 0 项</span>
        <button class="btn-ai ghost" onclick="toggleSelectAll()">全选/取消</button>
        <button class="btn-ai ghost" onclick="clearSelection()">清除选择</button>
        <button class="btn-ai primary" id="btnClassify" onclick="startClassify()" disabled>
            <i class="bi bi-cpu"></i> 开始 AI 分类
        </button>
        <select id="topN" style="width:80px;">
            <option value="5">5类</option>
            <option value="8" selected>8类</option>
            <option value="10">10类</option>
            <option value="15">15类</option>
        </select>
    </div>

    <!-- 仓库列表 -->
    <div class="repo-list" id="repoList">
        <div class="empty-repos">加载中...</div>
    </div>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">AI 正在分析分类中，请稍候...</div>
    </div>

    <!-- 分类结果 -->
    <div class="result-section" id="resultSection">
        <div class="page-header" style="margin-top: 24px;">
            <h5><i class="bi bi-diagram-3"></i> 分类结果</h5>
        </div>
        <div id="resultContent"></div>
    </div>

</div>

<th:block layout:fragment="scripts">
    <script>
        document.getElementById('nav-stars').classList.add('active');

        let allRepos = [];
        let selectedIds = new Set();

        // 页面加载
        loadRepos();

        function loadRepos() {
            const lang = document.getElementById('langFilter').value;
            const kw = document.getElementById('kwFilter').value;
            fetch('/ai/classify/repos?language=' + encodeURIComponent(lang) + '&keyword=' + encodeURIComponent(kw))
                .then(r => r.json())
                .then(data => {
                    allRepos = data.repos || [];
                    renderRepoList();
                })
                .catch(err => console.error('加载仓库失败:', err));
        }

        function renderRepoList() {
            const container = document.getElementById('repoList');
            if (!allRepos.length) {
                container.innerHTML = '<div class="empty-repos">没有找到仓库，请调整筛选条件</div>';
                return;
            }
            let html = '';
            allRepos.forEach(repo => {
                const sel = selectedIds.has(repo.id) ? ' selected' : '';
                const desc = repo.description || '';
                const stars = repo.starsCount || 0;
                const lang = repo.language || '';
                html += '<div class="repo-item' + sel + '" onclick="toggleRepo(' + repo.id + ', event)">' +
                    '<input type="checkbox" ' + (sel ? 'checked' : '') + ' onclick="event.stopPropagation();toggleRepo(' + repo.id + ', event)">' +
                    '<div class="repo-info">' +
                    '<div class="repo-name-text">' + escapeHtml(repo.repoName) + '</div>' +
                    '<div class="repo-desc-text">' + escapeHtml(desc) + '</div>' +
                    '</div>' +
                    '<div class="repo-meta-text">' +
                    (lang ? '<span>' + escapeHtml(lang) + '</span>' : '') +
                    '<span><i class="bi bi-star-fill"></i> ' + stars + '</span>' +
                    '</div>' +
                    '</div>';
            });
            container.innerHTML = html;
            updateSelectCount();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function toggleRepo(id, event) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateSelectCount();
            // 更新行样式
            const items = document.getElementById('repoList').querySelectorAll('.repo-item');
            allRepos.forEach((repo, i) => {
                items[i].classList.toggle('selected', selectedIds.has(repo.id));
                items[i].querySelector('input[type="checkbox"]').checked = selectedIds.has(repo.id);
            });
        }

        function toggleSelectAll() {
            if (selectedIds.size === allRepos.length) {
                selectedIds.clear();
            } else {
                allRepos.forEach(r => selectedIds.add(r.id));
            }
            renderRepoList();
        }

        function clearSelection() {
            selectedIds.clear();
            renderRepoList();
        }

        function updateSelectCount() {
            document.getElementById('selectCount').textContent = '已选 ' + selectedIds.size + ' 项';
            document.getElementById('btnClassify').disabled = selectedIds.size === 0;
        }

        function startClassify() {
            if (selectedIds.size === 0) return;
            document.getElementById('loadingOverlay').classList.add('show');
            document.getElementById('btnClassify').disabled = true;

            const topN = parseInt(document.getElementById('topN').value);
            const repoIdArr = Array.from(selectedIds);

            fetch('/ai/classify/execute', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({repoIds: repoIdArr, topN: topN})
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('loadingOverlay').classList.remove('show');
                if (data.success) {
                    renderResults(data.categories);
                } else {
                    alert('分类失败: ' + (data.message || '未知错误'));
                }
                document.getElementById('btnClassify').disabled = false;
            })
            .catch(err => {
                document.getElementById('loadingOverlay').classList.remove('show');
                alert('请求失败: ' + err.message);
                document.getElementById('btnClassify').disabled = false;
            });
        }

        function renderResults(categories) {
            const section = document.getElementById('resultSection');
            const content = document.getElementById('resultContent');
            section.classList.add('show');

            let html = '';
            for (const [catName, repos] of Object.entries(categories)) {
                html += '<div class="category-card">' +
                    '<div class="category-header">' +
                    '<span class="category-title">' + escapeHtml(catName) + '</span>' +
                    '<span class="category-count">' + repos.length + ' 个项目</span>' +
                    '</div>' +
                    '<div class="category-body">';
                repos.forEach(repo => {
                    html += '<div class="category-repo-item">' +
                        (repo.language ? '<span class="lang-badge">' + escapeHtml(repo.language) + '</span>' : '') +
                        '<span class="star-badge"><i class="bi bi-star-fill"></i> ' + (repo.starsCount || 0) + '</span>' +
                        '<a href="' + escapeHtml(repo.htmlUrl) + '" target="_blank" title="' + escapeHtml(repo.fullName || '') + '">' +
                        escapeHtml(repo.repoName) +
                        '</a>' +
                        '</div>';
                });
                html += '</div></div>';
            }
            content.innerHTML = html;
            content.scrollIntoView({behavior: 'smooth'});
        }
    </script>
</th:block>
</body>
</html>
